experience:
  - role: Predoctoral Graduate Research Assistant
    org: Cognitive Disorders Research Lab
    start: 2021-08-11
    summary: |
      Led research on kinase signaling and drug repurposing using
      transcriptomic and kinome array data. Designed and maintained
      bioinformatics pipelines and R-based tooling for large-scale
      data analysis, and contributed to internal computational
      infrastructure including cloud-based workflows. Mentored
      junior trainees and contributed to teaching and course
      development in bioinformatics and data analysis.

  - role: Graduate Research Assistant
    org: Cognitive Disorders Research Lab
    start: 2020-01-11
    end: 2021-08-10
    summary: |
      Conducted research on inferring kinase signaling networks from
      kinome array data using Bayesian approaches. Developed early
      versions of drugfindR for gene expression–based drug repurposing
      and created the KINNET R package for kinase network inference.
      Built and maintained analysis pipelines for kinome and
      transcriptomic datasets, establishing core workflows later
      expanded during doctoral work.

  - role: Physician (Psychiatry)
    org: Clinical Practice
    start: 2015-01-01
    end: 2018-12-31
    summary: |
      Completed clinical rotations across major medical specialties
      during house job training, followed by service as Deputy Medical
      Superintendent. Managed clinical operations, coordinated care
      delivery, and supervised clinical staff, developing strong
      foundations in clinical decision-making and healthcare systems
      that inform current work in translational computational biology.

