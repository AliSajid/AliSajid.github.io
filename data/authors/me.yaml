bio: |
  I am a computational biologist and physician-scientist focused on
  kinase signaling, drug repurposing, and high-dimensional biological data analysis.
  My work bridges clinical insight with computational methods, with an emphasis on
  translating omics data into actionable biological understanding.

  I develop tools and pipelines for analyzing kinase activity and gene expression,
  and I am particularly interested in scalable methods for integrating multi-omics
  datasets to uncover therapeutic opportunities.

  Prior to my PhD, I trained and practiced as a physician, which continues to shape
  my research perspective toward clinically meaningful problems.

